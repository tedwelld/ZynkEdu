name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend: build + test
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: .NET build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ZynkEdu.slnx

      - name: Build (Release)
        run: dotnet build ZynkEdu.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test tests/ZynkEdu.Tests/ZynkEdu.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/

      - name: Coverage gate (≥ 60 %)
        run: |
          COVERED=$(grep -oP 'line-rate="\K[0-9.]+' coverage/**/coverage.cobertura.xml | head -1)
          echo "Line coverage: $COVERED"
          python3 -c "import sys; rate=float('$COVERED'); sys.exit(0 if rate >= 0.60 else 1)" \
            || (echo "Coverage $COVERED is below the 60 % gate" && exit 1)

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Angular build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ZynkEdu.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ZynkEdu.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration production
